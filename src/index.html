<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SE Store · Redemptions</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Set the theme class before anything paints, to avoid a flash of the wrong theme.
    (function () {
      try {
        var stored = localStorage.getItem('se_theme');
        var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = stored === 'dark' || (stored !== 'light' && sysDark);
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="selection:bg-iris/30">
  <app-root></app-root>
</body>
</html>
